name: Regression Auditor Signing Key Attestation

on:
  workflow_dispatch:
    inputs:
      expected_public_key_b64:
        description: Expected raw Ed25519 public key encoded as base64
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  attest:
    name: Signing Key Attestation
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment: regression-auditor

    steps:
      - name: Checkout protected issuer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install pinned verifier dependency
        run: >-
          python -m pip install --disable-pip-version-check --no-cache-dir
          --only-binary=:all: --require-hashes
          -r .github/regression-auditor-requirements.txt

      - name: Attest protected signing key
        shell: bash
        env:
          PRIVATE_KEY_B64: ${{ secrets.AIMS_REGRESSION_AUDITOR_ED25519_PRIVATE_KEY_B64 }}
          EXPECTED_PUBLIC_KEY_B64: ${{ inputs.expected_public_key_b64 }}
        run: |
          python - <<'PY'
          import base64
          import hmac
          import os

          from cryptography.hazmat.primitives.asymmetric.ed25519 import (
              Ed25519PrivateKey,
          )
          from cryptography.hazmat.primitives.serialization import (
              Encoding,
              PublicFormat,
          )

          private_key_b64 = os.environ["PRIVATE_KEY_B64"].strip()
          expected_public_key_b64 = os.environ["EXPECTED_PUBLIC_KEY_B64"].strip()
          print(f"::add-mask::{private_key_b64}")

          private_key = base64.b64decode(private_key_b64, validate=True)
          expected_public_key = base64.b64decode(
              expected_public_key_b64,
              validate=True,
          )
          if len(private_key) != 32:
              raise RuntimeError("protected Ed25519 private key must be 32 raw bytes")
          if len(expected_public_key) != 32:
              raise RuntimeError("expected Ed25519 public key must be 32 raw bytes")

          actual_public_key = (
              Ed25519PrivateKey.from_private_bytes(private_key)
              .public_key()
              .public_bytes(Encoding.Raw, PublicFormat.Raw)
          )
          if not hmac.compare_digest(actual_public_key, expected_public_key):
              raise RuntimeError("protected signing key does not match trust policy")

          print("Signing public key attestation PASS")
          PY
