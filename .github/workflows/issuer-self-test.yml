name: Issuer Self Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  self-test:
    name: Issuer Self Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout protected issuer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install pinned verifier dependency
        run: >-
          python -m pip install --disable-pip-version-check --no-cache-dir
          --only-binary=:all: --require-hashes
          -r .github/regression-auditor-requirements.txt

      - name: Compile protected verifier
        run: >-
          python -m py_compile
          scripts/regression_auditor_check.py
          scripts/regression_auditor_issue.py
          scripts/regression_evidence_runner.py

      - name: Validate protected workflow contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          issuer = Path(".github/workflows/regression-auditor-issuer.yml").read_text(
              encoding="utf-8"
          )
          verifier = Path(".github/workflows/regression-auditor-verify.yml").read_text(
              encoding="utf-8"
          )
          attestation = Path(
              ".github/workflows/regression-auditor-key-attestation.yml"
          ).read_text(encoding="utf-8")
          assert "environment: regression-auditor" in issuer
          assert 'get("implementationIdentity", "")' in issuer
          assert 'get("pullRequestBaseSha", "")' in issuer
          assert "candidate_base_sha=$DECISION_CANDIDATE_BASE_SHA" in issuer
          assert "BASE_SHA: ${{ steps.decision-review.outputs.candidate_base_sha }}" in issuer
          assert "Fetch protected PR base for full-delta binding" in issuer
          assert 'git -C candidate fetch --no-tags --depth=1 origin "$BASE_SHA"' in issuer
          assert 'git -C candidate cat-file -e "${BASE_SHA}^{commit}"' in issuer
          assert "steps.decision-review.outputs.implementation_identity" in issuer
          assert 'github-actor-id:${{ github.actor_id }}' not in issuer
          assert "repository_dispatch:" in verifier
          assert "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" in verifier
          assert "permission-checks: write" in verifier
          assert "permission-pull-requests: read" in verifier
          assert "owner: aim2nasa" in verifier
          assert "owner: wonderboy-kwak" not in verifier
          assert "TRUSTED_APP_REGISTRATION_OWNER: aims-regression-security" in verifier
          assert "TRUSTED_CANDIDATE_REPOSITORY: aim2nasa/aims" in verifier
          assert "AIMS_REPOSITORY_ID: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}" in verifier
          assert "Validate security-app identity and installation scope" in verifier
          assert 'gh api "apps/$APP_SLUG"' in verifier
          assert "gh api installation/repositories" in verifier
          assert "requiredCheckAppOwner" in verifier
          assert "requiredCheckAppSlug" in verifier
          assert "steps.app-token.outputs.app-slug" in verifier
          assert 'repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER' in verifier
          assert "Validate trust activation binding" in verifier
          assert "requiredCheckIntegrationId" in verifier
          assert "BOOTSTRAP_LOCKED" in verifier
          assert "github.event.client_payload.base_sha" not in verifier
          assert "github.event.client_payload.head_sha" not in verifier
          assert "github.event.client_payload.implementation_user_id" not in verifier
          assert 'cat-file -e "${BASE_SHA}^{commit}"' in verifier
          assert 'cat-file -e "${HEAD_SHA}^{commit}"' in verifier
          assert 'merge-base "$BASE_SHA" "$HEAD_SHA"' in verifier
          assert '"$BASE_SHA...$HEAD_SHA" > "$changed_files_path"' in verifier
          assert "mapfile -d '' changed_files < <(" not in verifier
          issuer_checkout = issuer.split(
              "Checkout trusted issuer from default branch", 1
          )[1].split("Bind decision to a distinct approved GitHub reviewer", 1)[0]
          assert "fetch-depth: 0" in issuer_checkout
          assert "/check-runs" in verifier
          assert "statuses: write" not in verifier
          assert "workflow_dispatch:" in attestation
          assert "expected_public_key_b64:" in attestation
          assert "environment: regression-auditor" in attestation
          assert "AIMS_REGRESSION_AUDITOR_ED25519_PRIVATE_KEY_B64" in attestation
          assert "Ed25519PrivateKey.from_private_bytes" in attestation
          assert "Encoding.Raw" in attestation
          assert "PublicFormat.Raw" in attestation
          assert "hmac.compare_digest" in attestation
          assert "Signing public key attestation PASS" in attestation
          assert "::add-mask::" in attestation
          assert "print(private" not in attestation
          assert "print(actual" not in attestation
          PY

      - name: Validate authoritative trust policy
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PublicKey

          policy = json.loads(
              Path(".github/regression-auditor-trust.json").read_text(encoding="utf-8")
          )
          assert policy["schema"] == "aims.regression_auditor_trust.v1"
          activation = policy["activation"]
          assert activation["issuerRepository"] == (
              "aims-regression-security/aims-regression-auditor"
          )
          assert activation["candidateRepository"] == "aim2nasa/aims"
          assert activation["requiredCheckName"] == (
              "Regression Auditor / trusted-verifier"
          )
          assert activation["requiredCheckAppOwner"] == "aims-regression-security"
          assert activation["requiredCheckAppSlug"] == (
              "aims-regression-auditor-security"
          )

          if policy["provisioned"]:
              assert activation["state"] == "ACTIVE"
              assert activation["requiredCheckIntegrationId"] == 4291228
              assert activation["activationReviewerIdentity"] == "github-app-id:4291228"
              evidence = activation["evidence"]
              assert isinstance(evidence, list) and evidence
              assert all(isinstance(item, str) and item.strip() for item in evidence)
              serialized = json.dumps(activation, ensure_ascii=False).lower()
              assert all(
                  token not in serialized
                  for token in ("pending", "todo", "미실행", "예정", "나중에 확인")
              )

              issuers = policy["issuers"]
              assert isinstance(issuers, list) and len(issuers) == 1
              issuer = issuers[0]
              assert issuer["issuer"] == "github-environment:regression-auditor"
              assert issuer["algorithm"] == "ed25519"
              assert issuer["maxValiditySeconds"] == 600
              public_keys = issuer["publicKeys"]
              assert set(public_keys) == {"primary-2026-07"}
              raw_public_key = base64.b64decode(
                  public_keys["primary-2026-07"],
                  validate=True,
              )
              assert len(raw_public_key) == 32
              Ed25519PublicKey.from_public_bytes(raw_public_key)
          else:
              assert activation["state"] == "BOOTSTRAP_LOCKED"
              assert policy["issuers"] == []
          PY
