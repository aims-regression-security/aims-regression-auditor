name: Issuer Self Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  self-test:
    name: Issuer Self Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout protected issuer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install pinned verifier dependency
        run: >-
          python -m pip install --disable-pip-version-check --no-cache-dir
          --only-binary=:all: --require-hashes
          -r .github/regression-auditor-requirements.txt

      - name: Compile protected verifier
        run: >-
          python -m py_compile
          scripts/regression_auditor_check.py
          scripts/regression_auditor_issue.py
          scripts/regression_evidence_runner.py

      - name: Validate protected workflow contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          issuer = Path(".github/workflows/regression-auditor-issuer.yml").read_text(
              encoding="utf-8"
          )
          verifier = Path(".github/workflows/regression-auditor-verify.yml").read_text(
              encoding="utf-8"
          )
          assert "environment: regression-auditor" in issuer
          assert "repository_dispatch:" in verifier
          assert "actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1" in verifier
          assert "permission-checks: write" in verifier
          assert "/check-runs" in verifier
          assert "statuses: write" not in verifier
          PY

      - name: Validate main-only issuer environment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api "repos/$GITHUB_REPOSITORY/environments/regression-auditor" | \
            python -c 'import json,sys; value=json.load(sys.stdin); policy=value.get("deployment_branch_policy") or {}; assert policy == {"protected_branches": False, "custom_branch_policies": True}'
          gh api "repos/$GITHUB_REPOSITORY/environments/regression-auditor/deployment-branch-policies" | \
            python -c 'import json,sys; value=json.load(sys.stdin); policies=value.get("branch_policies", []); assert len(policies) == 1 and policies[0].get("name") == "main" and policies[0].get("type") == "branch"'

      - name: Validate authoritative trust policy
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PublicKey

          policy = json.loads(
              Path(".github/regression-auditor-trust.json").read_text(encoding="utf-8")
          )
          assert policy["schema"] == "aims.regression_auditor_trust.v1"
          assert policy["provisioned"] is True
          assert len(policy["issuers"]) == 1
          issuer = policy["issuers"][0]
          assert issuer["issuer"] == "github-environment:regression-auditor"
          assert issuer["algorithm"] == "ed25519"
          assert issuer["maxValiditySeconds"] == 600
          public_key = base64.b64decode(
              issuer["publicKeys"]["primary-2026-07"],
              validate=True,
          )
          Ed25519PublicKey.from_public_bytes(public_key)
          PY
