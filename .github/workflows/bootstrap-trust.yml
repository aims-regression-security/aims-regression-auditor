name: Bootstrap Regression Auditor Trust

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CANDIDATE_REPOSITORY: aim2nasa/aims
  AUDITOR_ENVIRONMENT: regression-auditor
  DEPLOY_KEY_TITLE: aims-regression-auditor-read-2026-07

jobs:
  bootstrap:
    name: Generate protected keys once
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout issuer default branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install pinned signature dependency
        run: >-
          python -m pip install --disable-pip-version-check --no-cache-dir
          --only-binary=:all: --require-hashes
          -r .github/regression-auditor-requirements.txt

      - name: Generate signing key and authoritative trust policy
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey

          private_key = Ed25519PrivateKey.generate()
          private_raw = private_key.private_bytes(
              encoding=serialization.Encoding.Raw,
              format=serialization.PrivateFormat.Raw,
              encryption_algorithm=serialization.NoEncryption(),
          )
          public_raw = private_key.public_key().public_bytes(
              encoding=serialization.Encoding.Raw,
              format=serialization.PublicFormat.Raw,
          )
          temp = Path(os.environ["RUNNER_TEMP"])
          (temp / "signer-private.b64").write_text(
              base64.b64encode(private_raw).decode("ascii"),
              encoding="ascii",
          )
          policy = {
              "schema": "aims.regression_auditor_trust.v1",
              "provisioned": True,
              "issuers": [
                  {
                      "issuer": "github-environment:regression-auditor",
                      "algorithm": "ed25519",
                      "maxValiditySeconds": 600,
                      "publicKeys": {
                          "primary-2026-07": base64.b64encode(public_raw).decode("ascii")
                      },
                  }
              ],
          }
          Path(".github/regression-auditor-trust.json").write_text(
              json.dumps(policy, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          ssh-keygen -q -t ed25519 -N '' -C "$DEPLOY_KEY_TITLE" \
            -f "$RUNNER_TEMP/candidate-read"

      - name: Store signer and read-only candidate credentials
        env:
          GH_TOKEN: ${{ secrets.AIMS_AUDITOR_BOOTSTRAP_ADMIN_TOKEN }}
        shell: bash
        run: |
          gh secret set AIMS_REGRESSION_AUDITOR_ED25519_PRIVATE_KEY_B64 \
            --repo "$GITHUB_REPOSITORY" \
            --env "$AUDITOR_ENVIRONMENT" \
            < "$RUNNER_TEMP/signer-private.b64"
          gh secret set AIMS_REGRESSION_CANDIDATE_READ_SSH_KEY \
            --repo "$GITHUB_REPOSITORY" \
            --env "$AUDITOR_ENVIRONMENT" \
            < "$RUNNER_TEMP/candidate-read"
          gh variable set AIMS_REGRESSION_CANDIDATE_REPOSITORY \
            --repo "$GITHUB_REPOSITORY" \
            --env "$AUDITOR_ENVIRONMENT" \
            --body "$CANDIDATE_REPOSITORY"

          existing_ids="$(gh api "repos/$CANDIDATE_REPOSITORY/keys" \
            --jq ".[] | select(.title == \"$DEPLOY_KEY_TITLE\") | .id")"
          for key_id in $existing_ids; do
            gh api --method DELETE "repos/$CANDIDATE_REPOSITORY/keys/$key_id"
          done
          gh api --method POST "repos/$CANDIDATE_REPOSITORY/keys" \
            -f title="$DEPLOY_KEY_TITLE" \
            -f key="$(cat "$RUNNER_TEMP/candidate-read.pub")" \
            -F read_only=true

      - name: Publish trust policy and remove bootstrap workflow
        shell: bash
        run: |
          rm .github/workflows/bootstrap-trust.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/regression-auditor-trust.json .github/workflows/bootstrap-trust.yml
          git commit -m "보호 Auditor 신뢰 루트 활성화"
          git push origin HEAD:main

      - name: Remove one-time bootstrap credential
        if: always()
        env:
          GH_TOKEN: ${{ secrets.AIMS_AUDITOR_BOOTSTRAP_ADMIN_TOKEN }}
        shell: bash
        run: |
          gh secret delete AIMS_AUDITOR_BOOTSTRAP_ADMIN_TOKEN \
            --repo "$GITHUB_REPOSITORY" || true
