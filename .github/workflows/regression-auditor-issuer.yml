name: Regression Auditor Receipt Issuer

run-name: Issue Auditor receipt for ${{ inputs.candidate_ref }}

on:
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: Exact candidate commit SHA or protected ref
        required: true
        type: string
      subject_receipt:
        description: Repository-relative Regression Auditor subject receipt
        required: true
        type: string
      output_receipt:
        description: Repository-relative signed Auditor receipt output
        required: true
        type: string
      auditor_decision:
        description: Protected default-branch Auditor decision path
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  issue-receipt:
    name: Protected receipt issuance
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: regression-auditor

    steps:
      - name: Checkout trusted issuer from default branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: issuer
          fetch-depth: 0
          persist-credentials: false

      - name: Bind decision to a distinct approved GitHub reviewer
        id: decision-review
        env:
          GH_TOKEN: ${{ github.token }}
          AUDITOR_DECISION: ${{ inputs.auditor_decision }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          if [[ ! "$AUDITOR_DECISION" =~ ^decisions/[A-Za-z0-9._/-]+\.json$ ]] || \
             [[ "$AUDITOR_DECISION" == *".."* ]]; then
            echo "auditor_decision must be a safe decisions/*.json path" >&2
            exit 2
          fi
          DECISION_COMMIT="$(git -C issuer log -1 --format=%H -- "$AUDITOR_DECISION")"
          if [[ -z "$DECISION_COMMIT" ]]; then
            echo "protected decision commit was not found" >&2
            exit 2
          fi
          DECISION_PR="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$GITHUB_REPOSITORY/commits/$DECISION_COMMIT/pulls" | \
            python -c 'import json,sys; branch=sys.argv[1]; prs=[p for p in json.load(sys.stdin) if p.get("merged_at") and p.get("base", {}).get("ref") == branch]; print(prs[0]["number"] if len(prs) == 1 else "")' \
              "$DEFAULT_BRANCH")"
          if [[ -z "$DECISION_PR" ]]; then
            echo "protected decision must be introduced by one merged default-branch PR" >&2
            exit 2
          fi
          DECISION_REVIEWER_IDENTITY="$(
            python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("decisionReviewerIdentity", ""))' \
              "issuer/$AUDITOR_DECISION"
          )"
          DECISION_IMPLEMENTATION_IDENTITY="$(
            python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("implementationIdentity", ""))' \
              "issuer/$AUDITOR_DECISION"
          )"
          if [[ ! "$DECISION_REVIEWER_IDENTITY" =~ ^github-user-id:[0-9]+$ ]] || \
             [[ ! "$DECISION_IMPLEMENTATION_IDENTITY" =~ ^github-actor-id:[0-9]+$ ]] || \
             [[ "${DECISION_REVIEWER_IDENTITY#github-user-id:}" == "${DECISION_IMPLEMENTATION_IDENTITY#github-actor-id:}" ]]; then
            echo "decision reviewer must be a distinct GitHub user id" >&2
            exit 2
          fi
          REVIEWER_ID="${DECISION_REVIEWER_IDENTITY#github-user-id:}"
          REVIEW_STATE="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$GITHUB_REPOSITORY/pulls/$DECISION_PR/reviews" \
            --jq "[.[] | select(.user.id == $REVIEWER_ID)] | sort_by(.submitted_at) | last | .state // empty")"
          if [[ "$REVIEW_STATE" != "APPROVED" ]]; then
            echo "decision PR lacks a current APPROVED review from the bound reviewer" >&2
            exit 2
          fi
          echo "reviewer_identity=$DECISION_REVIEWER_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "implementation_identity=$DECISION_IMPLEMENTATION_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Validate protected candidate configuration
        env:
          AIMS_CANDIDATE_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          CANDIDATE_REF: ${{ inputs.candidate_ref }}
        run: |
          if [[ ! "$AIMS_CANDIDATE_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "AIMS_REGRESSION_CANDIDATE_REPOSITORY must be an owner/repository value" >&2
            exit 2
          fi
          if [[ ! "$CANDIDATE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "candidate_ref must be an exact lowercase commit SHA" >&2
            exit 2
          fi

      - name: Checkout candidate as read-only input
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          ref: ${{ inputs.candidate_ref }}
          path: candidate
          ssh-key: ${{ secrets.AIMS_REGRESSION_CANDIDATE_READ_SSH_KEY }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require exact immutable candidate SHA
        env:
          CANDIDATE_REF: ${{ inputs.candidate_ref }}
        run: |
          test "$(git -C candidate rev-parse HEAD)" = "$CANDIDATE_REF"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install pinned signature dependency
        run: >-
          python -m pip install --disable-pip-version-check --no-cache-dir
          --only-binary=:all: --require-hashes
          -r issuer/.github/regression-auditor-requirements.txt

      - name: Issue signed receipt with protected key
        env:
          AIMS_REGRESSION_AUDITOR_ED25519_PRIVATE_KEY_B64: ${{ secrets.AIMS_REGRESSION_AUDITOR_ED25519_PRIVATE_KEY_B64 }}
          AIMS_CANDIDATE_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          AUDITOR_DECISION: ${{ inputs.auditor_decision }}
          DECISION_REVIEWER_IDENTITY: ${{ steps.decision-review.outputs.reviewer_identity }}
          SUBJECT_RECEIPT: ${{ inputs.subject_receipt }}
          OUTPUT_RECEIPT: ${{ inputs.output_receipt }}
        run: |
          python issuer/scripts/regression_auditor_issue.py \
            --candidate-root candidate \
            --trust-root issuer \
            --output-root issued \
            --subject "$SUBJECT_RECEIPT" \
            --output "$OUTPUT_RECEIPT" \
            --decision "$AUDITOR_DECISION" \
            --decision-reviewer-identity "$DECISION_REVIEWER_IDENTITY" \
            --repository "$AIMS_CANDIDATE_REPOSITORY" \
            --issuer "github-environment:regression-auditor" \
            --key-id "primary-2026-07" \
            --implementation-identity "${{ steps.decision-review.outputs.implementation_identity }}" \
            --ttl-seconds 600

      - name: Upload signed receipt only
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: regression-auditor-receipt-${{ github.run_id }}
          path: issued/${{ inputs.output_receipt }}
          if-no-files-found: error
          retention-days: 7
