name: Regression Auditor External Trusted Verifier

run-name: Verify AIMS candidate ${{ github.event.client_payload.head_sha }}

on:
  repository_dispatch:
    types: [regression-auditor-verify]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRUSTED_CHECK_NAME: Regression Auditor / trusted-verifier

jobs:
  verify:
    name: Protected external verification
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: regression-auditor

    steps:
      - name: Validate immutable dispatch coordinates
        env:
          BASE_SHA: ${{ github.event.client_payload.base_sha }}
          CANDIDATE_REPOSITORY: ${{ github.event.client_payload.repository }}
          EXPECTED_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
          IMPLEMENTATION_USER_ID: ${{ github.event.client_payload.implementation_user_id }}
        shell: bash
        run: |
          [[ "$CANDIDATE_REPOSITORY" == "$EXPECTED_REPOSITORY" ]]
          [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$IMPLEMENTATION_USER_ID" =~ ^[0-9]+$ ]]

      - name: Create security-app check token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.AIMS_REGRESSION_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AIMS_REGRESSION_VERIFIER_APP_PRIVATE_KEY }}
          owner: aim2nasa
          repositories: aims
          permission-checks: write

      - name: Checkout protected verifier from issuer default branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: issuer
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout exact AIMS candidate as read-only input
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          ref: ${{ github.event.client_payload.head_sha }}
          path: candidate
          ssh-key: ${{ secrets.AIMS_REGRESSION_CANDIDATE_READ_SSH_KEY }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require one signed commit over the exact PR base
        env:
          BASE_SHA: ${{ github.event.client_payload.base_sha }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
        shell: bash
        run: |
          test "$(git -C candidate rev-parse HEAD)" = "$HEAD_SHA"
          read -r -a commit_line <<< "$(git -C candidate rev-list --parents -n 1 "$HEAD_SHA")"
          if [[ "${#commit_line[@]}" -ne 2 ]] || [[ "${commit_line[1]}" != "$BASE_SHA" ]]; then
            echo "candidate must be one signed commit whose only parent is the exact PR base" >&2
            exit 2
          fi

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install protected verifier dependencies
        run: >-
          python -m pip install --disable-pip-version-check --no-cache-dir
          --only-binary=:all: --require-hashes
          -r issuer/.github/regression-auditor-requirements.txt

      - name: Verify with protected issuer code
        id: verify
        env:
          AIMS_REGRESSION_AUDITOR_TRUST_ROOT: ${{ github.workspace }}/issuer
          AIMS_IMPLEMENTATION_IDENTITY: github-actor-id:${{ github.event.client_payload.implementation_user_id }}
          BASE_SHA: ${{ github.event.client_payload.base_sha }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
        shell: bash
        run: |
          set +e
          mapfile -d '' changed_files < <(
            git -C candidate diff --name-only -z "$BASE_SHA" "$HEAD_SHA"
          )
          python issuer/scripts/regression_auditor_check.py \
            --root candidate \
            --mode commit \
            --files "${changed_files[@]}"
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [[ "$exit_code" -eq 0 ]]; then
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "summary=Protected signed receipt verified" >> "$GITHUB_OUTPUT"
          else
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "summary=Regression Auditor gate blocked this candidate" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish security-app check on exact candidate SHA
        if: always() && steps.app-token.outputs.token != ''
        env:
          CANDIDATE_REPOSITORY: ${{ github.event.client_payload.repository }}
          CONCLUSION: ${{ steps.verify.outputs.conclusion || 'failure' }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
          SUMMARY: ${{ steps.verify.outputs.summary || 'Protected verifier infrastructure failed' }}
        shell: bash
        run: |
          gh api --method POST \
            -H 'Accept: application/vnd.github+json' \
            "repos/$CANDIDATE_REPOSITORY/check-runs" \
            -f name="$TRUSTED_CHECK_NAME" \
            -f head_sha="$HEAD_SHA" \
            -f status=completed \
            -f conclusion="$CONCLUSION" \
            -f details_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            -f 'output[title]=Regression Auditor gate' \
            -f "output[summary]=$SUMMARY"

      - name: Enforce verifier result
        if: always()
        env:
          EXIT_CODE: ${{ steps.verify.outputs.exit_code || '2' }}
        shell: bash
        run: exit "$EXIT_CODE"
