name: Regression Auditor External Trusted Verifier

run-name: Verify AIMS pull request candidates

on:
  repository_dispatch:
    types: [regression-auditor-verify]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Optional AIMS pull request number; empty verifies all open PRs
        required: false
        type: string
  schedule:
    - cron: '2-59/5 * * * *'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRUSTED_APP_REGISTRATION_OWNER: aims-regression-security
  TRUSTED_CANDIDATE_REPOSITORY: aim2nasa/aims
  TRUSTED_CHECK_NAME: Regression Auditor / trusted-verifier

jobs:
  select-candidates:
    name: Select AIMS pull requests
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment: regression-auditor
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}

    steps:
      - name: Create security-app discovery token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.AIMS_REGRESSION_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AIMS_REGRESSION_VERIFIER_APP_PRIVATE_KEY }}
          owner: aim2nasa
          repositories: aims
          permission-pull-requests: read

      - name: Select requested or open pull requests
        id: select
        env:
          DISPATCH_PR_NUMBER: ${{ github.event.client_payload.pull_request_number }}
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MANUAL_PR_NUMBER: ${{ inputs.pull_request_number }}
          REQUESTED_REPOSITORY: ${{ github.event.client_payload.repository }}
        shell: bash
        run: |
          [[ "$EXPECTED_REPOSITORY" == "$TRUSTED_CANDIDATE_REPOSITORY" ]]

          selected_pr=""
          if [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
            [[ "$REQUESTED_REPOSITORY" == "$EXPECTED_REPOSITORY" ]]
            selected_pr="$DISPATCH_PR_NUMBER"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            selected_pr="$MANUAL_PR_NUMBER"
          elif [[ "$EVENT_NAME" != "schedule" ]]; then
            echo "unsupported verifier event: $EVENT_NAME" >&2
            exit 2
          fi

          if [[ -n "$selected_pr" ]]; then
            [[ "$selected_pr" =~ ^[1-9][0-9]*$ ]]
            matrix="$(
              printf '{"include":[{"pull_request_number":%s}]}' "$selected_pr"
            )"
          else
            matrix="$(
              gh api "repos/$EXPECTED_REPOSITORY/pulls?state=open&per_page=100" \
                --jq '{include: [.[] | {pull_request_number: .number}]}' | jq -c .
            )"
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  verify:
    name: Lane-aware external verification
    needs: select-candidates
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: regression-auditor
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-candidates.outputs.matrix) }}

    steps:
      - name: Validate dispatch request
        env:
          EXPECTED_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          PR_NUMBER: ${{ matrix.pull_request_number }}
        shell: bash
        run: |
          [[ "$EXPECTED_REPOSITORY" == "$TRUSTED_CANDIDATE_REPOSITORY" ]]
          [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]

      - name: Create security-app check token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.AIMS_REGRESSION_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AIMS_REGRESSION_VERIFIER_APP_PRIVATE_KEY }}
          owner: aim2nasa
          repositories: aims
          permission-checks: write
          permission-pull-requests: read

      - name: Validate security-app identity and installation scope
        env:
          APP_ID: ${{ vars.AIMS_REGRESSION_VERIFIER_APP_ID }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          EXPECTED_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          IFS=$'\t' read -r ACTUAL_APP_ID ACTUAL_APP_SLUG ACTUAL_APP_OWNER < <(
            gh api "apps/$APP_SLUG" \
              --jq '[.id, .slug, .owner.login] | @tsv'
          )
          [[ "$ACTUAL_APP_ID" == "$APP_ID" ]]
          [[ "$ACTUAL_APP_SLUG" == "$APP_SLUG" ]]
          [[ "$ACTUAL_APP_OWNER" == "$TRUSTED_APP_REGISTRATION_OWNER" ]]
          [[ "$EXPECTED_REPOSITORY" == "$TRUSTED_CANDIDATE_REPOSITORY" ]]

          IFS=$'\t' read -r SCOPED_REPOSITORY_COUNT SCOPED_REPOSITORY < <(
            gh api installation/repositories \
              --jq '[.total_count, (.repositories | if length == 1 then .[0].full_name else "" end)] | @tsv'
          )
          [[ "$SCOPED_REPOSITORY_COUNT" == "1" ]]
          [[ "$SCOPED_REPOSITORY" == "$EXPECTED_REPOSITORY" ]]

      - name: Resolve authoritative PR coordinates through GitHub API
        id: pr
        env:
          EXPECTED_BASE_BRANCH: ${{ vars.AIMS_REGRESSION_CANDIDATE_DEFAULT_BRANCH }}
          EXPECTED_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ matrix.pull_request_number }}
        shell: bash
        run: |
          IFS=$'\t' read -r STATE BASE_REPOSITORY BASE_BRANCH BASE_SHA HEAD_REPOSITORY HEAD_SHA IMPLEMENTATION_USER_ID < <(
            gh api "repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER" \
              --jq '[.state, .base.repo.full_name, .base.ref, .base.sha, .head.repo.full_name, .head.sha, (.user.id | tostring)] | @tsv'
          )
          [[ "$STATE" == "open" ]]
          [[ "$BASE_REPOSITORY" == "$EXPECTED_REPOSITORY" ]]
          [[ "$HEAD_REPOSITORY" == "$EXPECTED_REPOSITORY" ]]
          [[ "$BASE_BRANCH" == "$EXPECTED_BASE_BRANCH" ]]
          [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$IMPLEMENTATION_USER_ID" =~ ^[0-9]+$ ]]
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "implementation_user_id=$IMPLEMENTATION_USER_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout protected verifier from issuer default branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: issuer
          fetch-depth: 1
          persist-credentials: false

      - name: Validate trust activation binding
        env:
          ACTUAL_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          AIMS_REGRESSION_VERIFIER_APP_ID: ${{ vars.AIMS_REGRESSION_VERIFIER_APP_ID }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          policy = json.loads(
              Path("issuer/.github/regression-auditor-trust.json").read_text(
                  encoding="utf-8"
              )
          )
          activation = policy.get("activation", {})
          assert activation.get("requiredCheckName") == (
              "Regression Auditor / trusted-verifier"
          )
          assert activation.get("candidateRepository") == os.environ[
              "TRUSTED_CANDIDATE_REPOSITORY"
          ]
          assert activation.get("requiredCheckAppOwner") == os.environ[
              "TRUSTED_APP_REGISTRATION_OWNER"
          ]
          assert activation.get("requiredCheckAppSlug") == os.environ[
              "ACTUAL_APP_SLUG"
          ]
          if policy.get("provisioned") is True:
              assert activation.get("state") == "ACTIVE"
              assert activation.get("requiredCheckIntegrationId") == int(
                  os.environ["AIMS_REGRESSION_VERIFIER_APP_ID"]
              )
          else:
              assert activation.get("state") == "BOOTSTRAP_LOCKED"
          PY

      - name: Checkout exact AIMS candidate as read-only input
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          ref: ${{ steps.pr.outputs.head_sha }}
          path: candidate
          ssh-key: ${{ secrets.AIMS_REGRESSION_CANDIDATE_READ_SSH_KEY }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require exact authoritative PR head
        env:
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        shell: bash
        run: |
          test "$(git -C candidate rev-parse HEAD)" = "$HEAD_SHA"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Classify authoritative PR raw diff with protected snapshot
        id: lane
        env:
          AUTHORITATIVE_BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        shell: bash
        run: |
          set +e
          decision="$(python issuer/scripts/solo_v2_pr_lane.py \
            --root candidate \
            --base "$AUTHORITATIVE_BASE_SHA" \
            --head "$HEAD_SHA" 2>/dev/null)"
          classifier_exit=$?
          set -e

          if [[ "$classifier_exit" -ne 0 ]] || ! jq -e \
            '(.lane == "direct" or .lane == "core" or .lane == "protected") and
             (.requires_protected_verifier | type == "boolean") and
             (.reason_code | type == "string") and
             (.reason | type == "string")' \
            <<<"$decision" >/dev/null; then
            lane="protected"
            reason_code="classifier_execution_error"
            reason="Protected external classifier failed closed"
          else
            lane="$(jq -r .lane <<<"$decision")"
            reason_code="$(jq -r .reason_code <<<"$decision")"
            reason="$(jq -r .reason <<<"$decision")"
          fi

          echo "lane=$lane" >> "$GITHUB_OUTPUT"
          echo "reason_code=$reason_code" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Install protected verifier dependencies
        if: steps.lane.outputs.lane == 'protected'
        run: >-
          python -m pip install --disable-pip-version-check --no-cache-dir
          --only-binary=:all: --require-hashes
          -r issuer/.github/regression-auditor-requirements.txt

      - name: Verify selected lane
        id: verify
        env:
          AIMS_REGRESSION_AUDITOR_TRUST_ROOT: ${{ github.workspace }}/issuer
          AIMS_REPOSITORY_ID: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          AIMS_IMPLEMENTATION_IDENTITY: github-actor-id:${{ steps.pr.outputs.implementation_user_id }}
          AUTHORITATIVE_BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          DISPATCH_ACTOR_ID: ${{ github.actor_id }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          IMPLEMENTATION_USER_ID: ${{ steps.pr.outputs.implementation_user_id }}
          LANE: ${{ steps.lane.outputs.lane }}
          LANE_REASON: ${{ steps.lane.outputs.reason }}
          LANE_REASON_CODE: ${{ steps.lane.outputs.reason_code }}
          MANUAL_PR_NUMBER: ${{ inputs.pull_request_number }}
          PR_NUMBER: ${{ matrix.pull_request_number }}
        shell: bash
        run: |
          if [[ "$LANE" == "direct" || "$LANE" == "core" ]]; then
            if [[ "$EVENT_NAME" != "workflow_dispatch" ]]; then
              echo "exit_code=0" >> "$GITHUB_OUTPUT"
              echo "conclusion=success" >> "$GITHUB_OUTPUT"
              echo "skip_check=true" >> "$GITHUB_OUTPUT"
              echo "summary=Automatic verifier preserved the existing lightweight-lane check" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "skip_check=false" >> "$GITHUB_OUTPUT"
            if [[ "$MANUAL_PR_NUMBER" != "$PR_NUMBER" ]] || \
               [[ ! "$DISPATCH_ACTOR_ID" =~ ^[0-9]+$ ]] || \
               [[ "$DISPATCH_ACTOR_ID" != "$IMPLEMENTATION_USER_ID" ]]; then
              echo "exit_code=2" >> "$GITHUB_OUTPUT"
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "summary=Solo-v2 lightweight lane requires an explicit exact-PR dispatch by the PR author" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "summary=Solo-v2 $LANE local gate attested by the exact PR author; protected receipt and product-test rerun skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip_check=false" >> "$GITHUB_OUTPUT"
          if [[ "$LANE" != "protected" ]]; then
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "summary=Unknown external verifier lane failed closed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          BASE_SHA=""
          changed_files_path=""
          diff_error=""
          if ! changed_files_path="$(mktemp)"; then
            diff_error="Authoritative PR diff buffer could not be created"
          else
            trap 'rm -f "$changed_files_path"' EXIT
            if ! BASE_SHA="$(
              python issuer/scripts/regression_auditor_verify_base.py \
                --root candidate \
                --authoritative-base "$AUTHORITATIVE_BASE_SHA" \
                --head "$HEAD_SHA"
            )"; then
              diff_error="Signed receipt audit base could not be selected"
            elif ! git -C candidate cat-file -e "${BASE_SHA}^{commit}"; then
              diff_error="Authoritative PR base commit is unavailable"
            elif ! git -C candidate cat-file -e "${HEAD_SHA}^{commit}"; then
              diff_error="Authoritative PR head commit is unavailable"
            elif ! git -C candidate merge-base "$BASE_SHA" "$HEAD_SHA" >/dev/null; then
              diff_error="Authoritative PR commits have no common history"
            elif ! git -C candidate diff --name-only -z \
              "$BASE_SHA...$HEAD_SHA" > "$changed_files_path"; then
              diff_error="Authoritative PR diff could not be derived"
            fi
          fi
          if [[ -n "$diff_error" ]]; then
            exit_code=2
          else
            export BASE_SHA
            mapfile -d '' changed_files < "$changed_files_path"
            python issuer/scripts/regression_auditor_check.py \
              --root candidate \
              --mode commit \
              --files "${changed_files[@]}"
            exit_code=$?
          fi
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [[ "$exit_code" -eq 0 ]]; then
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "summary=Protected signed receipt verified ($LANE_REASON_CODE)" >> "$GITHUB_OUTPUT"
          elif [[ -n "$diff_error" ]]; then
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "summary=$diff_error" >> "$GITHUB_OUTPUT"
          else
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "summary=Regression Auditor gate blocked this candidate" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish security-app check on exact candidate SHA
        if: >-
          always() &&
          steps.app-token.outputs.token != '' &&
          steps.verify.outputs.skip_check != 'true'
        env:
          CANDIDATE_REPOSITORY: ${{ vars.AIMS_REGRESSION_CANDIDATE_REPOSITORY }}
          CONCLUSION: ${{ steps.verify.outputs.conclusion || 'failure' }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          SUMMARY: ${{ steps.verify.outputs.summary || 'Protected verifier infrastructure failed' }}
        shell: bash
        run: |
          gh api --method POST \
            -H 'Accept: application/vnd.github+json' \
            "repos/$CANDIDATE_REPOSITORY/check-runs" \
            -f name="$TRUSTED_CHECK_NAME" \
            -f head_sha="$HEAD_SHA" \
            -f status=completed \
            -f conclusion="$CONCLUSION" \
            -f details_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            -f 'output[title]=Regression Auditor gate' \
            -f "output[summary]=$SUMMARY"

      - name: Enforce verifier result
        if: always()
        env:
          EXIT_CODE: ${{ steps.verify.outputs.exit_code || '2' }}
        shell: bash
        run: exit "$EXIT_CODE"
